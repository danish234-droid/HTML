<!DOCTYPE html>
<html >
<head>
    <title>Forms</title>
</head>
<body>
    <form>
        <label for="username">Username</label>
        <input type="text" id="username"  ><br><br>

        <label for="ema">Email</label>
        <input type="email" id="ema" multiple><br><br>

        <label for="search">search</label>
        <input type="search" id="search"><br><br>

        <label for="pass">Password</label>
        <input type="password" id="pass"><br><br>

        <label for="tel">telephone number</label>
        <input type="tel" id="tel" pattern="[0-9]{11}"><br><br>

        <label for="url">URL</label>
        <input type="url" id="url"><br><br>

        <label for="num">number</label>
        <input type="number" id="num" min="100" max="500"><br><br>

        <label for="ran">range</label>
        <input type="range" id="ran" min="10" max="100" step="10"><br><br>

        <p>choose your gender</p>
        <label for="male">Male</label>
        <input type="radio" id="male" name="gender">
        <label for="female">Female</label>
        <input type="radio" id="female" name="gender"><br><br>

        <p>select your subjects</p>
        <label for="phy">physics</label>
        <input type="checkbox" id="phy">
        <label for="bio">biology</label>
        <input type="checkbox" id="bio">
        <label for="chem">chemistry</label>
        <input type="checkbox" id="chem">
        <label for="comp">computer</label>
        <input type="checkbox" id="comp">
        <label for="mat">math</label>
        <input type="checkbox" id="mat"><br><br>

        <label for="ti">time</label>
        <input type="time" id="ti"><br><br>

        <label for="da">date</label>
        <input type="date" id="da"><br><br>

        
        <label for="fi">file</label>
        <input type="file" id="fi"><br><br

        

                


 
       <input type="submit">

    </form>
</body>
</html>
